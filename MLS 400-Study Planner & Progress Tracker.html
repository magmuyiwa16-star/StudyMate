<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLS Study Planner & Progress Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #202020;
            --secondary: #0085FF;
            --accent: #FFCC5D;
            --bg: #F8F9FA;
            --border: rgba(32, 32, 32, 0.08);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: var(--primary);
        }

        .glass-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .course-card {
            width: 100%;
            padding: 1.25rem;
            border-radius: 16px;
            border: 2px solid var(--border);
            background: white;
            transition: transform 0.2s;
        }

        .course-card:hover {
            transform: translateY(-2px);
        }

        .progress-ring {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .btn-primary {
            border-radius: 8px;
            background: #202020;
            color: white;
            padding: 0.5rem 1rem;
            transition: background 0.2s;
        }

        .btn-primary:hover {
            background: #4D4D4D;
        }

        .btn-secondary {
            border-radius: 8px;
            background: #EEEEEE;
            color: #9C9C9C;
            padding: 0.5rem 1rem;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            background: #E5E5E5;
            color: #727272;
        }

        .streak-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            background: #FFF4E5;
            color: #FF8A00;
            border-radius: 20px;
            font-weight: 600;
        }

        .timer-circle {
            position: relative;
            width: 180px;
            height: 180px;
        }

        .topic-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 10px;
            border-radius: 8px;
            border-bottom: 1px solid var(--border);
        }

        .topic-item:last-child {
            border-bottom: none;
        }

        .kuse-branding {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: #727272;
            cursor: pointer;
            transition: color 0.2s;
            text-decoration: none;
        }

        .kuse-branding:hover {
            color: #202020;
        }

        .kuse-branding svg {
            height: 1.2em;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 10px;
        }
    </style>
</head>
<body class="min-h-screen pb-12">

    <!-- Header & Stats -->
    <header class="max-w-7xl mx-auto px-4 pt-8">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
            <div>
                <h1 class="text-3xl font-bold text-[#202020]">MLS Study Dashboard</h1>
                <p class="text-gray-500 mt-1">Academic Session 2025/2026 • 400 Level</p>
            </div>
            
            <div class="flex items-center gap-4">
                <div id="streakDisplay" class="streak-badge shadow-sm">
                    <span class="mr-1">🔥</span> <span id="streakCount">0</span> Day Streak
                </div>
                <div class="bg-blue-50 text-blue-600 px-4 py-2 rounded-[12px] font-semibold border border-blue-100">
                    Exam: <span id="examCountdown">--d --h</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Focus Today Section -->
            <div class="lg:col-span-2 glass-card p-6 flex flex-col gap-4">
                <div class="flex justify-between items-center">
                    <h2 class="text-lg font-semibold flex items-center gap-2">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
                        Focus Today
                    </h2>
                    <span id="currentDate" class="text-xs text-gray-400 font-medium"></span>
                </div>
                <div id="dailyFocusArea" class="flex-grow flex flex-col justify-center items-center py-4 bg-gray-50 rounded-[12px] border border-dashed border-gray-300">
                    <!-- Dynamic Focus Item -->
                    <div class="text-center px-4">
                        <p id="focusCourseCode" class="text-blue-600 font-bold text-xl mb-1"></p>
                        <p id="focusTopicName" class="text-[#202020] text-lg font-medium leading-tight max-w-md"></p>
                        <button onclick="markCurrentFocusDone()" class="mt-4 btn-primary flex items-center gap-2 mx-auto">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>
                            Mark as Completed
                        </button>
                    </div>
                </div>
            </div>

            <!-- Pomodoro Section -->
            <div class="glass-card p-6 flex flex-col items-center">
                <h2 class="text-lg font-semibold mb-4 w-full">Study Timer</h2>
                <div class="timer-circle flex items-center justify-center mb-4">
                    <svg class="absolute inset-0" width="180" height="180">
                        <circle cx="90" cy="90" r="85" fill="none" stroke="#EEEEEE" stroke-width="8" />
                        <circle id="timerProgress" cx="90" cy="90" r="85" fill="none" stroke="#202020" stroke-width="8" stroke-dasharray="534" stroke-dashoffset="0" class="progress-ring" />
                    </svg>
                    <div class="text-center z-10">
                        <div id="timerDisplay" class="text-4xl font-bold tabular-nums">45:00</div>
                        <div id="timerLabel" class="text-xs uppercase tracking-widest text-gray-500 font-semibold mt-1">Focus</div>
                    </div>
                </div>
                <div class="flex gap-2 w-full">
                    <button id="timerToggle" onclick="toggleTimer()" class="btn-primary flex-1">Start</button>
                    <button onclick="resetTimer()" class="btn-secondary">Reset</button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 mt-8">
        <div class="grid grid-cols-1 xl:grid-cols-4 gap-8">
            
            <!-- Sidebar: Schedule Info -->
            <aside class="xl:col-span-1 flex flex-col gap-6">
                <div class="glass-card p-5">
                    <h3 class="font-bold mb-4 flex items-center gap-2">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                        Calendar Events
                    </h3>
                    <div class="space-y-3 text-sm">
                        <div class="p-2 bg-yellow-50 border-l-4 border-yellow-400 rounded">
                            <p class="font-semibold text-yellow-800">Lectures</p>
                            <p class="text-yellow-700">Ends: July 3, 2026</p>
                        </div>
                        <div class="p-2 bg-red-50 border-l-4 border-red-400 rounded">
                            <p class="font-semibold text-red-800">Examinations</p>
                            <p class="text-red-700">Starts: July 13, 2026</p>
                        </div>
                    </div>
                </div>

                <div class="glass-card p-5 overflow-hidden">
                    <h3 class="font-bold mb-4">Readiness Map</h3>
                    <div id="readinessChart" class="space-y-4">
                        <!-- Readiness bars injected here -->
                    </div>
                </div>
            </aside>

            <!-- Course Progress Grid -->
            <div class="xl:col-span-3">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold">Your Courses</h2>
                    <button onclick="resetAllProgress()" class="text-xs text-red-500 hover:underline">Reset All Data</button>
                </div>
                <div id="courseGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Course cards injected here -->
                </div>
            </div>

        </div>
    </main>

    <!-- Branding Footer -->
    <footer class="max-w-7xl mx-auto px-4 mt-16 flex flex-col items-center gap-4">
        <a href="https://kuse.ai" class="kuse-branding" target="_blank">
            <span>made with</span>
            <svg viewBox="0,0,160,44" xmlns="http://www.w3.org/2000/svg"><path d="m.01,20.65C-.43,8.25,9.3-2.03,22.04.34,34.78,2.72,43.29,8.32,43.29,22.9s-8.66,19.01-22.03,20.3C7.9,44.5.46,33.05.01,20.65z" fill="currentColor"/><path fill-rule="evenodd" clip-rule="evenodd" d="m146.76,7.94c8.07,0,13.24,6.15,13.24,14.58v1.39h-20.75c.45,4.05,3.51,7.37,8.57,7.37,2.62,0,5.73-1.05,7.62-2.94l2.67,3.83c-2.67,2.55-6.62,3.88-10.9,3.88-8.07,0-14.08-5.6-14.08-14.08,0-7.76,5.67-14.02,13.63-14.02zm0,4.77c-5.01,0-7.29,3.83-7.57,7.1h15.13c-.11-3.16-2.28-7.1-7.57-7.1z" fill="currentColor"/><path d="m86.64,24.49c0,4.15,2.39,6.84,6.84,6.84,4.4,0,6.84-2.69,6.84-6.84V8.55h5.37v16.33c0,6.7-4.06,11.14-12.21,11.14-8.21,0-12.21-4.5-12.21-11.09V8.55h5.37v15.94zm32.99-16.55c4.49,0,8.06,1.47,10.6,3.86l-2.59,3.81c-2.05-2-5.28-3.08-8.06-3.08-2.88,0-4.84,1.37-4.84,3.32,0,1.91,2.64,2.54,5.81,3.27,4.59,1.08,10.26,2.4,10.26,8.46,0,4.94-3.76,8.41-11.14,8.41-4.98,0-8.94-1.76-11.24-4.11l2.54-4.11c1.86,1.91,5.18,3.67,8.84,3.67,3.91,0,5.57-1.66,5.57-3.62,0-2.3-2.88-2.98-6.21-3.76-4.54-1.08-9.87-2.3-9.87-8.06,0-4.5,4.2-8.06,10.31-8.06zM60.79,20.82,71.44,8.55h6.5L66.46,21.26,78.82,35.44h-6.5l-9.28-11.1-2.25,2.49v8.6h-5.33V8.55h5.33v12.27z" fill="currentColor"/></svg>
        </a>
    </footer>

    <!-- Topic Modal (Hidden) -->
    <div id="topicModal" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl rounded-[20px] max-h-[80vh] overflow-hidden flex flex-col">
            <div class="p-6 border-b flex justify-between items-center">
                <h2 id="modalTitle" class="text-xl font-bold"></h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div id="modalContent" class="p-6 overflow-y-auto flex-grow">
                <!-- Topics list -->
            </div>
        </div>
    </div>

    <script>
        // --- DATA ---
        const COURSES = [
            {
                code: `MLS 402`,
                name: `Medical Biostatistics`,
                topics: [`Characteristics and application of biostatistics`, `sample population variables`, `frequently distribution`, `vital and descriptive statistic measurement`, `central tendencies mean, median, mode dispersion`, `standard deviation and coefficient of variation`, `Collection and presentation of data probability distribution`, `Hypothetical tests of statistical significance`, `Analysis of variance`, `regression and correlation experimental designs and clinical trials`]
            },
            {
                code: `MLS 404`,
                name: `Biomedical Engineering`,
                topics: [`Workshop practice`, `Principles of use, maintenance and repair of common laboratory equipment`, `applied and general electronics`, `Circuit diagrams`, `Computer programming`, `Glass blowing and construction`, `Design techniques`, `improvement on existing equipment`]
            },
            {
                code: `MLS 406`,
                name: `Biotechnology and Bioinformatics`,
                topics: [`General preparation and storage of reagents`, `Preparation and purification of antibody and antigen`, `monoclonal and polyclonal antibodies`, `Concepts of vaccination`, `Preparation, purification and storage of vaccine`, `Introduction to Bioinformatics`, `Introduction to Mathematical and Computation Genomics`, `application to medicine and laboratory diagnosis`]
            },
            {
                code: `MLS 408`,
                name: `Histopathology I`,
                topics: [`Microscopy`, `Fixation`, `Decalcification`, `Tissue Processing`, `Microtomy`, `Pigments and Minerals`, `Staining in Histopathology`, `Extracellular substances`, `Connective tissue fibers`, `Cytoplasmic granules`]
            },
            {
                code: `MLS 410`,
                name: `Immunology & Immunochemistry`,
                topics: [`Immunoglobulin-Structure and infection`, `Gene Organization and assembly`, `Mediators of cellular Immunity`, `Phagocytic cell- Chemo taxis and effectors function`, `The complement system`, `Laboratory methods of detection of antigens and antibodies`, `Autoimmunity`, `Tissue and Craft reactions`, `Immunotolerance, self and non self`, `Histocompatibility`, `Transplantation`, `Tumor Immunology`, `Hypersensitivity`]
            },
            {
                code: `MLS 412`,
                name: `Virology I`,
                topics: [`Morphology and life cycle of viruses`, `nomenclature and classification of viruses`, `Reproduction and multiplication of viruses`, `resistance, pathology`, `collection of clinical specimens`, `Culture methods of isolation`, `purification`, `immunity`, `laboratory methods of diagnosis`, `Haemaglutination test`, `CFT`, `Neutralization test`, `systematic study of viral diseases`, `Interferon`, `immunotherapy and chemotherapy`, `inclusion bodies and cytopathic effects`, `Viral and host interactions`, `viral vaccines and immune prophylaxis`]
            },
            {
                code: `MLS 416`,
                name: `Laboratory Instrumentation & Techniques`,
                topics: [`theory and practice of colorimetry`, `spectroflourimetry flame photometry`, `conductometry`, `polarography`, `Osmometry`, `nephelometry`, `Turbidmetry`, `pH measurement by ion specific electrodes`, `Electrophoresis (paper, cellulose acetate, Agar gel, starch, polyacrylamide)`, `Isoelectric focusing`, `Isotophoresis`, `Chromatography`, `Ion exchange`, `Gel filtration`, `Molecular Sieves`, `dialysis filtration`, `Solvent Extraction`, `Centrifugation`, `Ultra-centrifugation`, `Immuno electrophoretic techniques`, `radio immunoassay`, `Enzyme Immuno assays`, `receptor Assay`, `automation`, `Micro and Ultra Micro Analysis`]
            },
            {
                code: `MLS 418`,
                name: `Practical Exercises IV`,
                topics: [`Creatinine Estimation`, `Creatinine Clearance`, `Urea and electrolytes estimation`, `Liver enzymes`, `total protein and albumin`, `bilirubin`, `Triglycerides`, `Lipoprotein`, `Cholesterol`, `Glucose estimation`, `Coombs Test`, `Antibody Identification`, `Antibody Titration`, `Clotology`, `Investigation of Haemolytic Disease`, `ABO and Rhesus Antibodies`, `Cross-matching`, `Blood Grouping`, `Haematoxylin and Eosin staining`, `Weigert Haematoxylin & Van Gieson`, `Verhoef Van Gieson`, `South Gate Mucicarmine`, `Congo red`, `Oil Red O`, `Gram staining`, `Perl's Prussian blue reaction`, `Melting point of paraffin wax`, `Identification of simple tissues (liver, kidney, lungs, GI)`, `Gordon and Sweet (Silver impregnation)`, `Best carmine method`, `Periodic acid Schiff reaction`, `Alcian blue`, `Von Kossa staining`, `Masson trichrome`, `Orcein method`, `Ziehl Neelsen method`, `Systematic Bacteriology`, `Biochemical tests (Oxidase, Motility, Indole, Citrate, Urease)`, `Inoculation/Streaking`, `Urine Examination`, `Stool Examination`, `Blood Parasites`, `Thick and thin film preparation`]
            }
        ];

        const EXAM_DATE = new Date(`2026-07-13T00:00:00`);

        // --- STATE & PERSISTENCE ---
        let progressData = JSON.parse(localStorage.getItem(`mls_progress`)) || {};
        let streak = parseInt(localStorage.getItem(`mls_streak`)) || 0;
        let lastStudyDate = localStorage.getItem(`mls_last_study_date`) || ``;

        // Pomodoro State
        let timerSeconds = parseInt(localStorage.getItem(`mls_timer_seconds`)) || 2700;
        let isTimerRunning = false;
        let isBreakMode = localStorage.getItem(`mls_timer_mode`) === `break`;
        let timerInterval;

        // --- INITIALIZATION ---
        function init() {
            updateDate();
            checkStreak();
            updateExamCountdown();
            renderCourses();
            updateDashboard();
            initTimer();
        }

        function updateDate() {
            const now = new Date();
            const options = { weekday: `long`, year: `numeric`, month: `long`, day: `numeric` };
            document.getElementById(`currentDate`).textContent = now.toLocaleDateString(`en-US`, options);
        }

        function checkStreak() {
            const today = new Date().toDateString();
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            const yesterdayStr = yesterday.toDateString();

            if (lastStudyDate === yesterdayStr) {
                // Streak maintained
            } else if (lastStudyDate !== today && lastStudyDate !== ``) {
                // Missed a day
                streak = 0;
                localStorage.setItem(`mls_streak`, 0);
            }
            document.getElementById(`streakCount`).textContent = streak;
        }

        function updateExamCountdown() {
            const now = new Date();
            const diff = EXAM_DATE - now;
            if (diff > 0) {
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                document.getElementById(`examCountdown`).textContent = `${days}d ${hours}h`;
            } else {
                document.getElementById(`examCountdown`).textContent = `EXAM PERIOD`;
            }
        }

        // --- PROGRESS CALCULATION ---
        function getCourseProgress(courseCode) {
            const course = COURSES.find(c => c.code === courseCode);
            const completed = progressData[courseCode] ? progressData[courseCode].length : 0;
            const total = course.topics.length;
            return {
                completed,
                total,
                percent: Math.round((completed / total) * 100) || 0
            };
        }

        // --- RENDERING ---
        function renderCourses() {
            const grid = document.getElementById(`courseGrid`);
            const readiness = document.getElementById(`readinessChart`);
            grid.innerHTML = ``;
            readiness.innerHTML = ``;

            // Sort for readiness chart (lowest first)
            const sortedCourses = [...COURSES].sort((a, b) => {
                return getCourseProgress(a.code).percent - getCourseProgress(b.code).percent;
            });

            COURSES.forEach(course => {
                const prog = getCourseProgress(course.code);
                const card = document.createElement(`div`);
                card.className = `course-card flex flex-col gap-4`;
                
                // Ring calculation
                const radius = 30;
                const circumference = 2 * Math.PI * radius;
                const offset = circumference - (prog.percent / 100) * circumference;

                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="text-xs font-bold text-blue-500 uppercase tracking-wider">${course.code}</span>
                            <h4 class="font-bold text-[#202020] leading-tight">${course.name}</h4>
                        </div>
                        <div class="relative w-16 h-16 flex items-center justify-center">
                            <svg width="64" height="64" class="absolute transform -rotate-90">
                                <circle cx="32" cy="32" r="${radius}" fill="none" stroke="#EEEEEE" stroke-width="4" />
                                <circle cx="32" cy="32" r="${radius}" fill="none" stroke="#202020" stroke-width="4" 
                                    stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" class="progress-ring" />
                            </svg>
                            <span class="text-xs font-bold">${prog.percent}%</span>
                        </div>
                    </div>
                    <div class="mt-auto">
                        <div class="text-[10px] text-gray-400 mb-2 uppercase font-bold">${prog.completed}/${prog.total} Topics Done</div>
                        <button onclick="openCourseModal('${course.code}')" class="btn-secondary w-full text-xs py-2">View Syllabus</button>
                    </div>
                `;
                grid.appendChild(card);
            });

            // Update Readiness sidebar
            sortedCourses.slice(0, 4).forEach(course => {
                const prog = getCourseProgress(course.code);
                const item = document.createElement(`div`);
                item.innerHTML = `
                    <div class="flex justify-between text-xs mb-1">
                        <span class="font-medium">${course.code}</span>
                        <span class="${prog.percent < 50 ? `text-red-500` : `text-green-500`}">${prog.percent}%</span>
                    </div>
                    <div class="h-1.5 w-full bg-gray-100 rounded-full overflow-hidden">
                        <div class="h-full bg-[#202020]" style="width: ${prog.percent}%"></div>
                    </div>
                `;
                readiness.appendChild(item);
            });
        }

        // --- MODAL HANDLING ---
        function openCourseModal(code) {
            const course = COURSES.find(c => c.code === code);
            const modal = document.getElementById(`topicModal`);
            const title = document.getElementById(`modalTitle`);
            const content = document.getElementById(`modalContent`);

            title.textContent = `${course.code}: ${course.name}`;
            content.innerHTML = ``;

            course.topics.forEach((topic, idx) => {
                const isDone = progressData[code] && progressData[code].includes(topic);
                const item = document.createElement(`div`);
                item.className = `topic-item`;
                item.innerHTML = `
                    <input type="checkbox" id="t-${idx}" ${isDone ? `checked` : ``} 
                        class="mt-1 w-5 h-5 accent-blue-600 rounded" 
                        onchange="toggleTopic('${code}', \`${topic}\`)">
                    <label for="t-${idx}" class="text-sm cursor-pointer ${isDone ? `text-gray-400 line-through` : `text-[#202020]`}">
                        ${topic}
                    </label>
                `;
                content.appendChild(item);
            });

            modal.classList.remove(`hidden`);
        }

        function closeModal() {
            document.getElementById(`topicModal`).classList.add(`hidden`);
        }

        function toggleTopic(code, topic) {
            if (!progressData[code]) progressData[code] = [];
            
            const index = progressData[code].indexOf(topic);
            if (index > -1) {
                progressData[code].splice(index, 1);
            } else {
                progressData[code].push(topic);
                // Update streak on new completion
                updateStreakAction();
            }

            saveData();
            renderCourses();
            updateDashboard();
        }

        function updateStreakAction() {
            const today = new Date().toDateString();
            if (lastStudyDate !== today) {
                streak++;
                lastStudyDate = today;
                localStorage.setItem(`mls_streak`, streak);
                localStorage.setItem(`mls_last_study_date`, today);
                document.getElementById(`streakCount`).textContent = streak;
            }
        }

        function saveData() {
            localStorage.setItem(`mls_progress`, JSON.stringify(progressData));
        }

        // --- DASHBOARD LOGIC (SMART PRIORITIZATION) ---
        let currentFocusTopic = { code: ``, topic: `` };

        function updateDashboard() {
            // Find course with lowest percentage
            const sorted = [...COURSES].sort((a, b) => {
                const pA = getCourseProgress(a.code).percent;
                const pB = getCourseProgress(b.code).percent;
                return pA - pB;
            });

            let targetFound = false;
            
            for (const course of sorted) {
                const completed = progressData[course.code] || [];
                const nextTopic = course.topics.find(t => !completed.includes(t));
                
                if (nextTopic) {
                    currentFocusTopic = { code: course.code, topic: nextTopic };
                    document.getElementById(`focusCourseCode`).textContent = currentFocusTopic.code;
                    document.getElementById(`focusTopicName`).textContent = nextTopic;
                    targetFound = true;
                    break;
                }
            }

            if (!targetFound) {
                document.getElementById(`focusCourseCode`).textContent = `MISSION ACCOMPLISHED`;
                document.getElementById(`focusTopicName`).textContent = `All topics completed. Time for general revision!`;
                currentFocusTopic = { code: ``, topic: `` };
            }
        }

        function markCurrentFocusDone() {
            if (currentFocusTopic.code) {
                toggleTopic(currentFocusTopic.code, currentFocusTopic.topic);
            }
        }

        // --- POMODORO TIMER ---
        function initTimer() {
            updateTimerUI();
        }

        function toggleTimer() {
            if (isTimerRunning) {
                clearInterval(timerInterval);
                document.getElementById(`timerToggle`).textContent = `Start`;
                isTimerRunning = false;
            } else {
                isTimerRunning = true;
                document.getElementById(`timerToggle`).textContent = `Pause`;
                timerInterval = setInterval(() => {
                    timerSeconds--;
                    if (timerSeconds < 0) {
                        completeTimerCycle();
                    }
                    updateTimerUI();
                    localStorage.setItem(`mls_timer_seconds`, timerSeconds);
                }, 1000);
            }
        }

        function completeTimerCycle() {
            clearInterval(timerInterval);
            isTimerRunning = false;
            document.getElementById(`timerToggle`).textContent = `Start`;
            
            if (isBreakMode) {
                isBreakMode = false;
                timerSeconds = 2700; // 45 mins
                alert(`Break over! Ready to focus?`);
            } else {
                isBreakMode = true;
                timerSeconds = 900; // 15 mins
                alert(`Session complete! Take a 15-minute break.`);
            }
            
            localStorage.setItem(`mls_timer_mode`, isBreakMode ? `break` : `focus`);
            updateTimerUI();
        }

        function resetTimer() {
            clearInterval(timerInterval);
            isTimerRunning = false;
            isBreakMode = false;
            timerSeconds = 2700;
            localStorage.setItem(`mls_timer_mode`, `focus`);
            localStorage.setItem(`mls_timer_seconds`, 2700);
            document.getElementById(`timerToggle`).textContent = `Start`;
            updateTimerUI();
        }

        function updateTimerUI() {
            const mins = Math.floor(timerSeconds / 60);
            const secs = timerSeconds % 60;
            document.getElementById(`timerDisplay`).textContent = `${mins.toString().padStart(2, `0`)}:${secs.toString().padStart(2, `0`)}`;
            document.getElementById(`timerLabel`).textContent = isBreakMode ? `Break` : `Focus`;
            
            const total = isBreakMode ? 900 : 2700;
            const circumference = 534;
            const offset = circumference - (timerSeconds / total) * circumference;
            document.getElementById(`timerProgress`).style.strokeDashoffset = offset;
        }

        function resetAllProgress() {
            if (confirm(`Are you sure you want to clear all your study progress? This cannot be undone.`)) {
                progressData = {};
                streak = 0;
                lastStudyDate = ``;
                saveData();
                localStorage.removeItem(`mls_streak`);
                localStorage.removeItem(`mls_last_study_date`);
                location.reload();
            }
        }

        window.onload = init;
    </script>
    <script src="https://cdn.kuse.ai/sdk.prd.js"></script>
</body>
</html>
